version: '3.8'

services:
  sms-server:
    image: ghcr.io/kilisniki/sms-android-server-telegram:latest
    container_name: sms-server
    restart: unless-stopped
    privileged: true
    network_mode: host
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - ./data:/app/data
    env_file:
      - .env
